<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#FAF5ED;
  color:#2b2b2b;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:#fff;
  position:sticky;
  top:0;
  z-index:100;
}

/* HERO */
.hero {
  padding:100px 8%;
  max-width:900px;
}
.hero h1 {
  font-family:'Playfair Display';
  font-size:50px;
}
.hero p {
  color:#666;
}
.btn {
  margin-top:20px;
  padding:12px 24px;
  background:#E8820C;
  color:#fff;
  border:none;
}

/* TRUST */
.trust {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
  padding:60px 8%;
}

/* PRODUCTS */
.container {
  padding:60px 8%;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.product-card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}
.product-card:hover {
  transform:translateY(-5px);
}

/* POPUP */
.popup {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  display:none;
}

</style>
</head>

<body>

<nav>
  <div><b>Kishor Spices</b></div>
  <div>
    <a href="shop/index.html">Shop</a>
  </div>
</nav>

<div class="hero">
  <h1>Ghar jaisa bharosa.<br>Asli swaad.</h1>
  <p>Sonbhadra se seedha aapke kitchen tak</p>
  <a href="shop/index.html"><button class="btn">Shop Now</button></a>
</div>

<div class="trust">
  <div><h3>100% Pure</h3></div>
  <div><h3>No Chemicals</h3></div>
  <div><h3>Strong Taste</h3></div>
</div>

<div class="container">
  <h2>Best Selling</h2>
  <div class="grid" id="productGrid"></div>
</div>

<!-- CRM POPUP -->
<div class="popup" id="popup">
  <h4>Get Offers 🎁</h4>
  <input id="name" placeholder="Name"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <button onclick="saveLead()">Submit</button>
</div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>

<script>

function loadProducts(){
  var html = KS.products.slice(0,6).map(p => `
    <div class="product-card">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="orderNow('${p.name}',${p.price})">Order</button>
    </div>
  `).join('');
  document.getElementById("productGrid").innerHTML = html;
}
loadProducts();

/* CRM */
setTimeout(()=>document.getElementById("popup").style.display="block",3000);

function saveLead(){
  var name=document.getElementById("name").value;
  var phone=document.getElementById("phone").value;

  var leads=JSON.parse(localStorage.getItem("leads")||"[]");
  leads.push({name,phone});
  localStorage.setItem("leads",JSON.stringify(leads));

  alert("Saved!");
}

/* WhatsApp Order */
function orderNow(name,price){
  var msg=`Order: ${name} - ₹${price}`;
  window.open(`https://wa.me/919120007475?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
