<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#FAF5ED;
  color:#1C1208;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 5%;
  background:#fff;
  border-bottom:1px solid #eee;
}
.nav-links {
  display:flex;
  gap:20px;
  list-style:none;
}
.nav-links a {
  text-decoration:none;
  color:#333;
  font-weight:500;
}

/* HERO */
.hero {
  padding:80px 5%;
  text-align:center;
}
.hero h1 {
  font-size:42px;
  margin-bottom:10px;
}
.hero p {
  color:#666;
  margin-bottom:20px;
}
.btn {
  background:#E8820C;
  color:#fff;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* PRODUCTS */
.container {
  max-width:1100px;
  margin:auto;
  padding:40px 5%;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}
.product-card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  text-align:center;
}
.product-card button {
  margin-top:10px;
  background:#E8820C;
  color:#fff;
  border:none;
  padding:6px 12px;
  border-radius:5px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#fff;
  border-top:1px solid #eee;
  margin-top:40px;
}
</style>

</head>
<body>

<!-- NAV -->
<nav>
  <div><b>Kishor Spices</b></div>
  <ul class="nav-links">
  <li><a href="shop/index.html">Shop</a></li>
  <li><a href="#about">About</a></li>
  <li><a href="#story">Our Journey</a></li>
  <li><a href="#contact">Contact</a></li>
</ul>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Pure Spices, Real Taste</h1>
  <p>Direct from Ghorawal, Sonbhadra — trusted since 1998</p>
  <a href="shop/index.html"><button class="btn">Shop Now</button></a>
</div>

<!-- PRODUCTS -->
<div class="container">
  <h2>Our Products</h2>
  <div class="grid" id="productGrid"></div>
</div>

<!-- FOOTER -->
<footer>
  © 2025 Kishor Spices | WhatsApp: 9120007475
</footer>

<!-- JS -->
<script src="js/data.js"></script>
<script src="js/cart.js"></script>

<script>
function loadProducts(){
  var html = KS.products.slice(0,6).map(p => `
    <div class="product-card">
      <div style="font-size:40px">${p.emoji}</div>
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${p.id})">Add</button>
    </div>
  `).join('');

  document.getElementById("productGrid").innerHTML = html;
}

loadProducts();
</script>

</body>
</html>
