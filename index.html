<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#FAF5ED;
  color:#2b2b2b;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:#fff;
}

/* HERO */
.hero {
  padding:100px 8%;
}
.hero h1 {
  font-family:'Playfair Display';
  font-size:48px;
}
.hero p {
  color:#666;
}
.btn {
  margin-top:20px;
  padding:12px 24px;
  background:#E8820C;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* TRUST */
.trust {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
  padding:60px 8%;
}

/* PRODUCTS */
.container {
  padding:60px 8%;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.product-card {
  background:#fff;
  padding:15px;
  border-radius:10px;
  transition:0.3s;
}
.product-card:hover {
  transform:translateY(-5px);
}

/* ANIMATION */
.reveal {
  opacity:0;
  transform:translateY(30px);
  transition:0.8s;
}
.reveal.show {
  opacity:1;
  transform:translateY(0);
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:12px 18px;
  border-radius:30px;
  text-decoration:none;
}

</style>
</head>

<body>

<nav>
  <div><b>Kishor Spices</b></div>
  <div><a href="shop/index.html">Shop</a></div>
</nav>

<div class="hero reveal">
  <h1>Ghar jaisa bharosa.<br>Asli swaad.</h1>
  <p>Sonbhadra se seedha aapke kitchen tak</p>
  <a href="shop/index.html"><button class="btn">Shop Now</button></a>
</div>

<div class="trust reveal">
  <div><h3>100% Pure</h3></div>
  <div><h3>No Chemicals</h3></div>
  <div><h3>Strong Taste</h3></div>
</div>

<div class="container reveal">
  <h2>Best Selling</h2>
  <div class="grid" id="productGrid"></div>
</div>

<a href="https://wa.me/919120007475" class="whatsapp">Order</a>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>

<script>

/* LOAD PRODUCTS (FIXED) */
function loadProducts(){
  var html = KS.products.slice(0,6).map(p => `
    <div class="product-card">
      <div style="font-size:30px">${p.emoji}</div>
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${p.id})">Add to Cart</button>
    </div>
  `).join('');
  document.getElementById("productGrid").innerHTML = html;
}
loadProducts();

/* ANIMATION */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

</script>

</body>
</html>
