<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0e0e0e;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  z-index:100;
}
nav a {
  color:#fff;
  text-decoration:none;
  margin-left:25px;
  font-size:14px;
}

/* HERO */
.hero {
  height:100vh;
  background:url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?q=80&w=1920') center/cover;
  display:flex;
  align-items:center;
  padding:0 8%;
  position:relative;
}
.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}
.hero-content {
  position:relative;
  max-width:600px;
}
.hero h1 {
  font-family:'Playfair Display';
  font-size:60px;
}
.hero p {
  margin-top:20px;
  color:#ccc;
}
.btn {
  margin-top:30px;
  padding:12px 30px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover {
  background:#fff;
  color:#000;
}

/* REVEAL */
.reveal {
  opacity:0;
  transform:translateY(50px);
  transition:all 1s ease;
}
.reveal.show {
  opacity:1;
  transform:translateY(0);
}

/* TRUST */
.trust {
  padding:80px 8%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:30px;
}
.trust div {
  border-left:2px solid #d4a017;
  padding-left:15px;
}

/* PRODUCTS */
.container {
  padding:80px 8%;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}
.product-card {
  background:#111;
  padding:20px;
  border:1px solid #222;
  transition:0.4s;
}
.product-card:hover {
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* FOOTER */
footer {
  padding:40px;
  text-align:center;
  color:#888;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px 18px;
  border-radius:30px;
  color:#fff;
  text-decoration:none;
}

</style>

</head>
<body>

<nav>
  <div>Kishor Spices</div>
  <div>
    <a href="shop/index.html">Shop</a>
    <a href="#story">Story</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero" id="hero">
  <div class="hero-content">
    <h1>Not just spices.<br>A legacy of flavor.</h1>
    <p>Crafted in Sonbhadra. Trusted in every kitchen.</p>
    <a href="shop/index.html"><button class="btn">Explore</button></a>
  </div>
</div>

<div class="trust reveal">
  <div><h3>100% Pure</h3><p>No artificial mixing</p></div>
  <div><h3>Farm Direct</h3><p>Authentic sourcing</p></div>
  <div><h3>Rich Flavor</h3><p>Strong aroma</p></div>
</div>

<div class="container reveal">
  <h2 style="font-family:'Playfair Display'">Signature Products</h2>
  <div class="grid" id="productGrid"></div>
</div>

<footer>
© Kishor Spices
</footer>

<a href="https://wa.me/919120007475" class="whatsapp">Chat</a>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>

<script>
function loadProducts(){
  var html = KS.products.slice(0,6).map(p => `
    <div class="product-card">
      <div style="font-size:40px">${p.emoji}</div>
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${p.id})">Add</button>
    </div>
  `).join('');
  document.getElementById("productGrid").innerHTML = html;
}
loadProducts();

/* Reveal */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

/* Parallax */
window.addEventListener("scroll",()=>{
  const hero = document.getElementById("hero");
  hero.style.backgroundPositionY = window.scrollY * 0.5 + "px";
});
</script>

</body>
</html>
