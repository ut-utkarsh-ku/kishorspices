<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices — Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --cream:#F8F2E4;
  --paper:#EFE5CC;
  --white:#fff;
  --ink:#1a140d;
  --muted:#7a6648;
  --saffron:#C8650A;
  --border:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:#fff;
}
nav a{
  text-decoration:none;
  color:var(--ink);
  margin-left:20px;
}

/* HERO */
.hero{
  padding:80px 8%;
}
.hero h1{
  font-family:'Cormorant Garamond';
  font-size:56px;
}
.hero p{
  color:var(--muted);
}

/* LAYOUT */
.shop{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:40px;
  padding:0 8% 80px;
}

/* FILTER */
.filter h4{
  font-size:12px;
  letter-spacing:2px;
  color:var(--muted);
}
.filter button{
  display:block;
  background:none;
  border:none;
  padding:6px 0;
  color:var(--muted);
  cursor:pointer;
}
.filter button.active,
.filter button:hover{
  color:var(--saffron);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:var(--white);
  border-radius:18px;
  padding:18px;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-8px);
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.card h3{
  font-family:'Cormorant Garamond';
}

.price{
  color:var(--saffron);
  font-weight:600;
}

/* ANIMATION */
.card{
  opacity:0;
  transform:translateY(40px);
  animation:fadeUp 0.6s ease forwards;
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  .shop{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body>

<nav>
  <div><b>Kishor Spices</b></div>
  <div>
    <a href="../index.html">Home</a>
  </div>
</nav>

<div class="hero">
  <h1>Our Spices</h1>
  <p>Pure. Authentic. From Sonbhadra.</p>
</div>

<div class="shop">

  <!-- FILTER -->
  <div class="filter">
    <h4>Category</h4>
    <div id="catFilters"></div>
  </div>

  <!-- PRODUCTS -->
  <div>
    <div class="grid" id="shopGrid"></div>
  </div>

</div>

<script src="../js/data.js"></script>
<script src="../js/cart.js"></script>

<script>

/* CATEGORY FILTER */
function renderCatFilters(){
  var cats = ['All'].concat([...new Set(KS.products.map(p=>p.category))]);
  document.getElementById('catFilters').innerHTML =
    cats.map(c=>`<button onclick="setCat('${c}',this)">${c}</button>`).join('');
}

/* STATE */
var currentCat = '';

function setCat(cat,el){
  currentCat = cat === 'All' ? '' : cat;

  document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  render();
}

/* RENDER */
function render(){
  var list = KS.products.filter(p=>p.status==='live');

  if(currentCat){
    list = list.filter(p=>p.category===currentCat);
  }

  document.getElementById('shopGrid').innerHTML =
    list.map(p=>`
      <div class="card">
        <div style="font-size:40px">${p.emoji}</div>
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add</button>
      </div>
    `).join('');
}

/* INIT */
renderCatFilters();
render();

</script>

</body>
</html>
