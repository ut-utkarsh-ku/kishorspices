<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices — Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#FAF5ED;
  --card:#fff;
  --text:#1C1C1C;
  --muted:#777;
  --accent:#E8820C;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
  background:#fff;
}

/* HERO */
.hero{
  padding:80px 8%;
}
.hero h1{
  font-family:'Playfair Display';
  font-size:56px;
}
.hero p{
  color:var(--muted);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:30px;
  padding:40px 8%;
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  transition:0.3s;
  cursor:pointer;
}
.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.card h3{
  font-family:'Playfair Display';
}

.price{
  color:var(--accent);
  font-weight:600;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-box{
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:300px;
}

.close{
  float:right;
  cursor:pointer;
}

/* BUTTON */
.btn{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:10px 20px;
  margin-top:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<nav>
  <div><b>Kishor Spices</b></div>
  <a href="../index.html">Home</a>
</nav>

<div class="hero">
  <h1>Our Spices</h1>
  <p>Crafted with purity and tradition</p>
</div>

<div class="grid" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box">
    <span class="close" onclick="closePopup()">✖</span>
    <h2 id="pname"></h2>
    <p id="pprice"></p>
    <button class="btn" onclick="addCart()">Add to Cart</button>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/cart.js"></script>

<script>

let selectedId = null;

/* LOAD */
function load(){
  document.getElementById("grid").innerHTML =
    KS.products.map(p=>`
      <div class="card" onclick="openPopup(${p.id})">
        <div style="font-size:40px">${p.emoji}</div>
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
      </div>
    `).join('');
}
load();

/* POPUP */
function openPopup(id){
  let p = KS.products.find(x=>x.id==id);
  selectedId = id;

  document.getElementById("pname").innerText = p.name;
  document.getElementById("pprice").innerText = "₹"+p.price;

  document.getElementById("popup").style.display="flex";
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* ADD TO CART FIX */
function addCart(){
  if(typeof addToCart === "function"){
    addToCart(selectedId);
    alert("Added to cart");
  }else{
    alert("Cart not loaded");
  }
}

</script>

</body>
</html>
