<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kishor Spices — Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#FAF5ED;
  color:#2b2b2b;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 8%;
  background:#fff;
  border-bottom:1px solid #eee;
}

/* HERO */
.hero{
  padding:60px 8% 20px;
}
.hero h1{
  font-family:'Playfair Display';
  font-size:42px;
}
.hero p{
  color:#666;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px 8% 60px;
}

/* CARD */
.card{
  background:#fff;
  padding:18px;
  border-radius:12px;
  border:1px solid #eee;
  transition:0.2s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card h3{
  font-family:'Playfair Display';
  font-size:18px;
}

.price{
  color:#E8820C;
  font-weight:600;
}

/* BUTTON */
.btn{
  margin-top:10px;
  background:#E8820C;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:12px 16px;
  border-radius:30px;
  text-decoration:none;
}

</style>
</head>

<body>

<nav>
  <div><b>Kishor Spices</b></div>
  <a href="../index.html">Home</a>
</nav>

<div class="hero">
  <h1>Our Products</h1>
  <p>Simple, pure, and trusted spices</p>
</div>

<div class="grid" id="grid"></div>

<a href="https://wa.me/919120007475" class="whatsapp">Order</a>

<script src="../js/data.js"></script>
<script src="../js/cart.js"></script>

<script>

function loadProducts(){
  if(!window.KS || !KS.products){
    alert("Product data not loading");
    return;
  }

  document.getElementById("grid").innerHTML =
    KS.products.map(p=>`
      <div class="card">
        <div style="font-size:32px">${p.emoji}</div>
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
        <button class="btn" onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `).join('');
}

loadProducts();

</script>

</body>
</html>
